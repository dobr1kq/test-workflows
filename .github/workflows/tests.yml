name: Run Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore final_project-main.sln

    - name: Build solution
      run: dotnet build final_project-main.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test tests/ECommerce.UnitTests/ECommerce.UnitTests.csproj --no-restore --logger "console;verbosity=minimal" --verbosity normal

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: ./coverage.opencover.xml
        flags: unittests
        fail_ci_if_error: false
